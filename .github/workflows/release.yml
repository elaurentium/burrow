name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  
jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: tar -czf burrow-linux.tar.gz -C target/release burrow
      - uses: softprops/action-gh-release@v1
        with:
          files: burrow-linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: tar -czf burrow-macos.tar.gz -C target/release burrow
      - uses: softprops/action-gh-release@v1
        with:
          files: burrow-macos.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
